name: "Compile Agentic Workflows"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Install gh-aw extension
        uses: github/gh-aw/actions/setup-cli@v0.76.1
        with:
          version: v0.76.1

      - name: Compile agentic workflows
        run: gh aw compile --validate --purge
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Report generated changes
        run: |
          if [ -n "$(git status --porcelain .github/workflows .gitattributes)" ]; then
            echo "Agentic workflow lock files changed. Download the artifact from this run and commit the generated files manually."
            git status --short .github/workflows .gitattributes
          else
            echo "No generated workflow changes."
          fi

      - name: Upload compiled workflow files
        uses: actions/upload-artifact@v4
        with:
          name: compiled-agentic-workflows
          path: |
            .github/workflows/*.lock.yml
            .github/aw/actions-lock.json
          if-no-files-found: warn
